# RTOScout — Docker CLI / Jupyter

services:
  rtoscout:
    build: .
    volumes:
      # Mount local code so container uses your edits
      - ./rtoscout:/app/rtoscout:ro
      # Chroma = ``<DATA_ROOT>/chroma`` in rtoscout/config.py (default /app/chroma)
      - ./chroma_data:/app/chroma
      - ./data:/app/data:ro
    stdin_open: true
    tty: true
    # e.g.  docker compose run --rm rtoscout python run.py -i /app/data/companies.json

  # Jupyter: docker compose --profile jupyter run --rm -p 8888:8888 jupyter
  # Open http://localhost:8888/?token=rtoscout (or use the URL printed in the terminal)
  jupyter:
    build: .
    environment:
      JUPYTER_TOKEN: rtoscout
      PYTHONPATH: /app
    ports:
      - "8888:8888"
    volumes:
      # Mount local code so container uses your edits
      - ./rtoscout:/app/rtoscout
      - ./chroma:/app/chroma
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    working_dir: /app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root notebooks/
    profiles:
      - jupyter
